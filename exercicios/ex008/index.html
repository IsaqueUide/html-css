<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peseuduclassis</title>
    <style>
        div{
            background-color: #f7f331;
            text-align: center;
            border:2px solid purple;
            height: 200px;
            width: 200px;
            display: inline-block;
        }
        div:hover{
            background-color: blueviolet;
            border: 2px solid #f7f331;
            color: white;
        }
        #d3 > img{
            display: none;
        }
        #d3:hover > img{
            display: block;
            width: 200px;
        }
        #list_title{
            font-size: 1.3em;
            text-decoration: underline;
            font-weight: bold;
            margin-bottom: 8px;
        }
        ul{
            text-align: center;
        }
        li{
            padding-bottom: 10px;
        }
        a{
            text-decoration: none;
            color: rgb(91, 41, 137);
        }
        a:hover{
            color: green;
            text-decoration: underline;
            font-weight: bolder;
        }
        a::after {
            content: ' ⇦';
            color: rgb(110, 110, 110);
            font-weight: normal;
        }
        a::before {
            content: '⇨ ';
            color: rgb(110, 110, 110);
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03
